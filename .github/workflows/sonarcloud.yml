name: SonarCloud analysis
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest
    steps:
      # CRITICAL: This step downloads your code so the scanner can see it
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3.1.0 # Using a stable version tag
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Required for PR decoration
        with:
          args: >
            -Dsonar.projectKey=Latz_Bookmarker-for-Nextcloud
            -Dsonar.organization=latz
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io
          projectBaseDir: .
          
